{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <section class="hero mb-4 text-center">
            <p class="eyebrow mb-2">Admin Access</p>
            <h2 class="mb-2">Secure the visitor desk</h2>
            <p class="lead mb-0">Sign in to open the dashboard, manage live visits, apply filters, and export reports.</p>
        </section>

        <div class="card p-4 shadow-sm form-card">
            <h4 class="mb-3">Staff Login</h4>
            <p class="text-muted small mb-4">Use the configured admin credentials to continue.</p>

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="next" value="{{ next_url }}">

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter admin username" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-dark w-100">Login</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
